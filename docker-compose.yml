services:
  postgres:
    image: postgres:16-alpine
    container_name: needapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-needapp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-needapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: needapp-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-needapp};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      GoogleSettings__ClientId: ${GOOGLE_CLIENT_ID}
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}
      SmtpSettings__SenderEmail: ${SMTP_SENDER_EMAIL}
      SmtpSettings__AppPassword: ${SMTP_APP_PASSWORD}
      SmtpSettings__LogoUrl: ${SMTP_LOGO_URL}
      SmtpSettings__AppUrl: ${SMTP_APP_URL}
      GeminiSettings__ApiKey: ${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
